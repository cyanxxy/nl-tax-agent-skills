# =============================================================================
# Source Register  --  Dutch Tax Skills Project
# =============================================================================
# Canonical list of every external source that skills depend on.
# Each entry carries enough metadata so that the refresh pipeline can
# validate freshness, and each skill can declare which sources it needs.
#
# Fields per entry:
#   id                 unique key (snake_case)
#   title              human-readable name
#   domain / url       authoritative location
#   source_type        law | official_guidance | official_rates |
#                      official_doctrine | official_algorithm_register |
#                      platform_docs | developer_reference | methodology
#   snapshot_path      local markdown snapshot relative to repo root
#   last_checked       ISO date of most recent manual verification
#   freshness_policy   how often / when to re-check
#   owner              team or role responsible for keeping the snapshot current
#   mandatory_for      list of skill names that MUST have access to this source
#
# Optional fields (present where applicable):
#   workflow           annual_return | provisional_assessment | security
#   tax_year           numeric year the source applies to
# =============================================================================

sources:

